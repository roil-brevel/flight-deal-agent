name: collect-flight-deals

on:
  schedule:
    - cron: "0 6 * * *"
    - cron: "0 16 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run collector
        env:
          TRAVELPAYOUTS_TOKEN: ${{ secrets.TRAVELPAYOUTS_TOKEN }}
          SERPAPI_KEY:         ${{ secrets.SERPAPI_KEY }}
          SMTP_HOST:           ${{ secrets.SMTP_HOST }}
          SMTP_PORT:           ${{ secrets.SMTP_PORT }}
          SMTP_USER:           ${{ secrets.SMTP_USER }}
          SMTP_PASS:           ${{ secrets.SMTP_PASS }}
          ALERT_TO:            ${{ secrets.ALERT_TO }}
          DASHBOARD_URL:       ${{ secrets.DASHBOARD_URL }}
        run: python -m src.collector

      - name: Commit updated data
        run: |
          git config user.name  "flight-deal-agent"
          git config user.email "actions@github.com"
          git add data/prices.db docs/data.json
          git commit -m "data: collector run $(date -u +%FT%TZ)" || { echo "no changes"; exit 0; }
          git pull --rebase --autostash origin main
          git push
